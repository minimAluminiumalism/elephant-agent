        "consolidated memories remain marked consolidated after restart",
        "deleted memory stays deleted after restart and no longer appears in retrieval"
      ]
    },
    {
      "id": "memory.resume-after-gap",
      "file": "resume-after-gap.md",
      "owner_profile": "Retrieval and persistence engineer",
      "purpose": "Resume a collaboration after a time gap and recover the durable memory that still matters.",
      "primary_assertions": [
        "current-work-linked memories are retrievable after inactivity",
        "the system explains why the recalled memory matters now",
        "freshly corrected memory is preferred over stale memory"
      ]
    },
    {
      "id": "memory.correction-and-deletion",
      "file": "memory-correction-and-deletion.md",
      "owner_profile": "Retrieval and persistence engineer",
      "purpose": "Correct stale memory, delete disallowed memory, and keep the durable trail inspectable.",
      "primary_assertions": [
        "corrections supersede stale memory instead of silently rewriting it",
        "protected memory is not deleted without explicit governance permission",
        "retrieval ignores deleted or superseded records"
      ]
