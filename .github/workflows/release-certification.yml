name: Release Certification

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_provider:
        description: Run the secret-backed system-layer reset live-provider smoke path
        required: true
        type: boolean
        default: false
      live_provider_base_url:
        description: Operator-managed OpenAI-compatible base URL for reset live certification
        required: true
        type: string
        default: REPLACE_BEFORE_RUN
      live_provider_model:
        description: Reset live-certification model id (must start with tke/)
        required: true
        type: string
        default: tke/replace-before-run

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-certification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            apps/site/package-lock.json
            apps/dashboard/package-lock.json

      - name: Install web dependencies
        run: make web-install

      - name: Run canonical system-layer reset release contract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
            BASE_REF="origin/${{ github.base_ref }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE_REF="${{ github.event.before }}"
            if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
              BASE_REF="HEAD^"
            fi
          else
            BASE_REF="origin/main"
          fi
          make release AGENT_BASE_REF="$BASE_REF"

  live-provider-certification:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_provider }}
    needs: deterministic-certification
    runs-on: ubuntu-latest
    env:
      ELEPHANT_LIVE_PROVIDER_PROVIDER_ID: openai-compatible
      ELEPHANT_LIVE_PROVIDER_BASE_URL: ${{ inputs.live_provider_base_url }}
      ELEPHANT_LIVE_PROVIDER_MODEL: ${{ inputs.live_provider_model }}
      ELEPHANT_LIVE_PROVIDER_API_KEY: ${{ secrets.ELEPHANT_LIVE_PROVIDER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Build dashboard assets for installed smoke
        run: |
          make dashboard-install
          make dashboard-build

      - name: Validate live-provider inputs
        run: |
          test -n "$ELEPHANT_LIVE_PROVIDER_BASE_URL" || { echo "ELEPHANT_LIVE_PROVIDER_BASE_URL is required"; exit 1; }
          test "$ELEPHANT_LIVE_PROVIDER_BASE_URL" != "REPLACE_BEFORE_RUN" || { echo "set live_provider_base_url before running live certification"; exit 1; }
          case "$ELEPHANT_LIVE_PROVIDER_BASE_URL" in
            http://*|https://*) ;;
            *)
              echo "live certification requires an http(s) base URL"
              exit 1
              ;;
          esac
          test -n "$ELEPHANT_LIVE_PROVIDER_API_KEY" || { echo "ELEPHANT_LIVE_PROVIDER_API_KEY secret is required"; exit 1; }
          case "$ELEPHANT_LIVE_PROVIDER_MODEL" in
            tke/*) ;;
            *)
              echo "live certification only permits model ids prefixed with tke/"
              exit 1
              ;;
          esac

      - name: Run live-provider smoke
        run: make test-live-provider-smoke
